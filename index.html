<script>
function exportPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let y = 10;

/* HEADER */
doc.setFontSize(14);
doc.text("PRE FLIGHT CHECK REPORT",10,y); y+=6;
doc.text("DJI T50 / T100",10,y); y+=6;
doc.line(10,y,200,y); y+=8;

/* LOOP DATA */
dataList.forEach((d,i)=>{

doc.setFontSize(10);

doc.text(`No: ${i+1}`,10,y); y+=5;
doc.text(`Tanggal: ${d.tanggal}`,10,y); y+=5;
doc.text(`Operator: ${d.operator}`,10,y); y+=5;
doc.text(`Unit: ${d.unit}`,10,y); y+=5;
doc.text(`Paddock: ${d.paddock}`,10,y); y+=5;
doc.text(`Application: ${d.application}`,10,y); y+=5;
doc.text(`Start Time: ${d.start || "-"}`,10,y); y+=6;

/* ===== CHECKLIST ===== */
doc.setFont(undefined,"bold");
doc.text("Checklist:",10,y); y+=6;
doc.setFont(undefined,"normal");

/* pastikan semua item muncul */
const checklistOrder = [
"Motor & Propeller",
"Battery & Port",
"RTK",
"Tank & Flow Meter",
"Wheighing Sensor",
"Atomized Sprinkler",
"Parameter",
"Chemical",
"Wind Average",
"Obstacle"
];

checklistOrder.forEach(item=>{
let val = d.checks[item] || "-";

/* simbol */
let symbol = "-";
if(val==="Good") symbol="✓";
if(val==="Bad") symbol="✗";

/* WARNA */
if(val==="Bad"){
doc.setTextColor(220,38,38); // merah
}else{
doc.setTextColor(0,0,0);
}

doc.text(`${item}: ${symbol} ${val}`,12,y);
y+=5;

/* page break aman */
if(y>270){
doc.addPage();
y=10;
}
});

/* reset warna */
doc.setTextColor(0,0,0);

y+=5;

/* ===== IMAGE ===== */
if(d.foto){
try{
doc.addImage(d.foto,"JPEG",10,y,80,60);
y+=65;
}catch(e){
doc.text("Gambar gagal dimuat",10,y);
y+=10;
}
}

y+=5;
doc.line(10,y,200,y);
y+=10;

/* page break */
if(y>260){
doc.addPage();
y=10;
}

});

doc.save("DJI_PreFlight_Report.pdf");
}
</script>
